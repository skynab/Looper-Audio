name: CI

on:
  push:
    branches: [ main, "phase-*" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS,   os: macos-latest }
          - { name: Windows, os: windows-latest }
          - { name: Linux,   os: ubuntu-latest }

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      # Cache the CPM-downloaded sources (JUCE, Catch2) between runs.
      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/get_cpm.cmake') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
